[package]
name = "cyrene"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
data-encoding = "2.10.0"
ed25519-dalek = { version = "3.0.0-pre.6", features = ["rand_core"] }
rand = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
ureq = { version = "3.2.0", features = ["json"] }
